services:
  database:
    image: postgres:18
    environment:
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: backend_user
      POSTGRES_DB: database_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_user -d database_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal-portal-network

networks:
  internal-portal-network:
    driver: bridge