name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      # Clé privée age pour SOPS (secret GitHub). OBLIGATOIRE : les secrets e2e
      # ne sont plus versionnés en clair, ils sont déchiffrés depuis
      # @apps/backend/.env.e2e.enc à l'étape ci-dessous. Voir tuto/2_sops.md.
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: backend_user
          POSTGRES_PASSWORD: backend_user
          POSTGRES_DB: database_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
    - uses: actions/checkout@v4
    - uses: wyvox/action-setup-pnpm@v3
    # Déchiffre les secrets e2e (lus par `pnpm e2e:setup` / `start:e2e` en
    # --mode=e2e). Requiert le secret SOPS_AGE_KEY ; échoue volontairement si
    # absent, car le .env.e2e en clair n'est plus versionné. Voir tuto/2_sops.md.
    - name: Decrypt e2e secrets (SOPS)
      run: |
        SOPS_VERSION=v3.13.1
        curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /usr/local/bin/sops
        chmod +x /usr/local/bin/sops
        sops decrypt --input-type dotenv --output-type dotenv @apps/backend/.env.e2e.enc > @apps/backend/.env.e2e
    - name: Build
      run: pnpm turbo build
    - name: Setup database
      working-directory: ./@apps/backend
      run: pnpm e2e:setup
    - name: Install Playwright Browsers
      working-directory: ./@apps/e2e
      run: pnpm exec playwright install --with-deps
    - name: Run Playwright tests
      working-directory: ./@apps/e2e
      run: pnpm test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: '@apps/e2e/playwright-report'
        if-no-files-found: error
        retention-days: 30
